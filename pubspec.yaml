name: myhive
description: "Hive Focus — a minimal, distraction-aware productivity app where your focus builds a living apiary of honey."
publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # UI & Fonts
  cupertino_icons: ^1.0.8
  google_fonts: ^8.2.0

  # Firebase Backend
  firebase_core: ^4.12.1
  firebase_auth: ^6.5.6
  cloud_firestore: ^6.7.1

  # State management
  provider: ^6.1.2

  # Charts for the analytics dashboard
  fl_chart: ^0.68.0

  # Focus calendar (streak / consistency view)
  table_calendar: ^3.1.2

  # Local persistence (sessions, theme, stats)
  shared_preferences: ^2.2.3

  # Date formatting
  intl: ^0.19.0

  # Unique ids for sessions / jars
  uuid: ^4.4.0

  # Solana wallet integration foundation
  solana: ^0.31.0+1
  bip39: ^1.0.6
  flutter_secure_storage: ^9.2.2

  # Sound effects + soothing focus & relaxation music
  audioplayers: ^6.1.0

  # Smart "Bee-Alert" nudges
  flutter_local_notifications: ^17.2.3

  # High-performance bee/honeycomb animations (Rive runtime)
  rive: ^0.13.13

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
  # App Icon & Splash Screen Generators
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/sounds/
    - assets/rive/
    - assets/images/

# --- flutter_launcher_icons config ---
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.jpeg"
  windows:
    generate: true
    image_path: "assets/logo.jpeg"

# --- flutter_native_splash config ---
flutter_native_splash:
  color: "#FFFBF3"
  color_dark: "#1B120A"
  image: assets/rive/splash_logo.png
  image_dark: assets/rive/splash_logo.png
  branding: assets/rive/splash_branding.png
  branding_mode: bottom
  android_12:
    color: "#FFFBF3"
    color_dark: "#1B120A"
    icon_background_color: "#F5A623"
    icon_background_color_dark: "#B86B00"
  web: true